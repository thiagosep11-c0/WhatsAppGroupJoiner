name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Permissão ao gradlew
        run: chmod +x gradlew

      - name: Regenerar Gradle Wrapper
        run: |
          curl -L "https://services.gradle.org/distributions/gradle-8.2-bin.zip" -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/gradle
          /tmp/gradle/gradle-8.2/bin/gradle wrapper --gradle-version 8.2

      - name: Build APK debug
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GroupJoiner-APK
          path: app/build/outputs/apk/debug/app-debug.apk
